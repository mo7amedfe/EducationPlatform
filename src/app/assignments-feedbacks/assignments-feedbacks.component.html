<div class="container py-4">
  <h3 class="mb-4">My Assignment Feedbacks</h3>

  <div class="mb-3">
    <label for="courseSelect" class="form-label">Select Course</label>
    <select id="courseSelect" class="form-select"  name="courseSelect">
      <option value="">All Courses</option>
      <option *ngFor="let course of courses" [value]="course">{{ course }}</option>
    </select>
  </div>

  <div *ngIf="filteredFeedbacks?.length; else noFeedbacks">
    <div *ngFor="let feedback of filteredFeedbacks" class="card mb-3">
      <div class="card-body">
        <h5 class="card-title">{{ feedback.courseName }} - {{ feedback.lessonTitle }}</h5>
        <p>
          <strong>Your Submission:</strong>
          <a [href]="feedback.fileUrl" target="_blank" class="btn btn-outline-primary btn-sm ms-2">
            <i class="fas fa-file-pdf me-1"></i>View PDF
          </a>
        </p>
        <div *ngIf="feedback.rating">
          <strong>Rating:</strong>
          <span class="badge bg-success">{{ feedback.rating }} / 5</span>
        </div>
        <div *ngIf="feedback.feedback">
          <strong>Feedback:</strong>
          <div class="alert alert-info mt-2 mb-0">{{ feedback.feedback }}</div>
        </div>
        <div *ngIf="!feedback.rating && !feedback.feedback" class="text-muted mt-2">
          No feedback yet.
        </div>
      </div>
    </div>
  </div>
  <ng-template #noFeedbacks>
    <div class="alert alert-info">You have no assignment feedbacks yet.</div>
  </ng-template>
</div>
