<div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-10 shadow p-4 rounded d-flex align-items-start gap-4 course-container">
        <div class="col-md-5">
          <img class="img-fluid rounded" [src]="course.imageurl.secure_url" alt="Course Image" />
        </div>
        <div class="col-md-7">
          <h2 class="mb-3">{{ course.title }}</h2>
          <p class="text-muted">{{ course.description }}</p>
        </div>
      </div>
    </div>
  </div>
