<div class="container">
    <div class="row pt-2">
        <div class="col-md-3 rounded-circle overflow-hidden p-0 m-0">
            <div *ngIf="!isEditing" class="w-100">
                <img class="w-100" [src]="imagePreview || 'assets/images/avatar-3814049_1280.png'" alt="">

            </div>
            <!-- <div *ngIf="!isEditing" class="w-100 position-relative image-container">
                <div class="layer">
                    <div class="w-100 h-100 d-flex justify-content-center align-items-center">
                        <i class="fa-solid fa-pen"></i>

                    </div>

                </div>
                <img class="w-100" src="assets/images/avatar-3814049_1280.png" alt="">
            </div> -->
            <!-- input مخفي -->
            <input type="file" #fileInput accept="image/*" style="display: none" (change)="onFileSelected($event)" />
            <!-- الديف اللي فيه الصورة -->
            <div *ngIf="isEditing"  class="w-100 position-relative image-container " (click)="fileInput.click()">
                <div class="layer">
                    <div class="w-100 h-100 d-flex justify-content-center align-items-center">
                        <i class="fa-solid fa-pen"></i>
                    </div>
                </div>

                <!-- الصورة تتغير لما تختار واحدة -->
                <img class="w-100" [src]="imagePreview || 'assets/images/avatar-3814049_1280.png'" alt="avatar" />
            </div>

        </div>
        <div class="col-md-9 d-flex flex-wrap p-2 align-items-center">
            <div *ngIf="!isEditing" class="w-100">
                <h3 class="text-black-50 m-0">Name: <span class="text-dark">{{ user.username }}</span></h3>
                <h3 class="text-black-50 m-0">Email: <span class="text-dark">{{ user.email }}</span></h3>
                <h3 class="text-black-50 m-0">Placement Test Score: <span class="text-dark">{{ user.score }}</span></h3>

                <button (click)="isEditing=true" class="btn btn-primary mt-2">Edit Profile</button>

            </div>

            <div *ngIf="isEditing" class="w-100">
                <form (ngSubmit)="updateUserData()" class="mt-3">
                    <div class="form-group d-flex align-items-center gap-2">
                      <h3 class="text-black-50 m-0">Name:</h3>
                      <input
                        type="text"
                        class="form-control w-25"
                        id="username"
                        [(ngModel)]="updatedUsername"
                        name="username"
                        required
                      />
                    </div>
                  
                    <div class="form-group d-flex align-items-center gap-2 mt-2">
                      <h3 class="text-black-50 m-0">Email :</h3>
                      <input
                        type="email"
                        class="form-control w-25"
                        id="email"
                        [(ngModel)]="updatedEmail"
                        name="email"
                        required
                      />
                    </div>
                  
                    <button type="submit" class="btn btn-primary mt-3">Update</button>
                  </form>
                  

                <div *ngIf="message" class="mt-2 alert alert-info">
                    {{ message }}
                </div>
            </div>


        </div>
    </div>
</div>
